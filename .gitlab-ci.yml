stages:
    - build_dockers
    - test
    - deploy
    - documentation

dockers:
    stage: build_dockers
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: docker:stable
    script:
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_runner" --target runner .
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_builder" --target builder .
        # - docker build -f Builder.dockerfile -t "$CI_REGISTRY_IMAGE/kernelo_coverage" --target coveragetester .
        - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
        - docker push "$CI_REGISTRY_IMAGE/xllim_runner"
        - docker push "$CI_REGISTRY_IMAGE/xllim_builder"
        # - docker push "$CI_REGISTRY_IMAGE/kernelo_coverage"
    
test_job:
    stage: test
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    script:
        - ls
        - pwd
        - rm -rf build && mkdir build && cd build
        # On est censé build ici et dans build_job... redondant !
        - cmake -S .. -B . -DPYTHON_LIBRARY_DIR="." -DCMAKE_BUILD_TYPE=Release
        - make install
        - ctest

build_job:
    stage: deploy
    when: manual
    artifacts:
        paths:
            - xllim*.so
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    script:
        - ls
        - pwd
        - apt-get install -y --no-install-recommends git
        - git submodule init
        - git submodule update
        - ls extern
        - ls extern/carma
        - ls extern/pybind11
        - cat extern/carma/carma_config.cmake
        - cat extern/carma/CMakeLists.txt
        - rm -rf build && mkdir build && cd build
        - cmake -S .. -B . -DPYTHON_LIBRARY_DIR="." -DCMAKE_BUILD_TYPE=Release
        - make install

pages:
    stage: documentation
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    script:
        - pip install -U sphinx sphinx-rtd-theme myst_parser
        - sphinx-build -b html docs/sphinx/source public
    artifacts:
        paths:
            - public
