# Core pipeline structure.
# Docker-related jobs are defined in .gitlab-ci-docker.yml.
# PyPI-related jobs are defined in .gitlab-ci-pypi.yml.
# List of stages for jobs, and their order of execution
stages:
    - package
    - publish-pypi
    - deploy

include:
    - local: ".gitlab-ci-docker.yml"
    - local: ".gitlab-ci-pypi.yml"
