stages:
    - build_dockers
    - test
    # - coverage
    # - documentation

dockers:
    stage: build_dockers
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: docker:stable
    script:
        - docker build -f Builder.dockerfile -t "$CI_REGISTRY_IMAGE/kernelo_runner" --target runner .
        - docker build -f Builder.dockerfile -t "$CI_REGISTRY_IMAGE/kernelo_builder" --target builder .
        - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
        - docker push "$CI_REGISTRY_IMAGE/kernelo_runner"
        - docker push "$CI_REGISTRY_IMAGE/kernelo_builder"
    
build_and_test:
    stage: test
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/kernelo_builder"
    script:
        - echo "Setting up symbolic links to test data"
        - ln -sf cpptest/functionalModel_tests/test_hapke.json .
        - ln -sf cpptest/functionalModel_tests/test_shkuratov.json .
        - echo "Bulding cpp tests ---------"
        - mkdir -p build; cd build
        - cmake ../ ; cmake --build .
        - echo "Running cpp tests ----------"
        - ./generation_test > /dev/null
        - ./learning_test > /dev/null
        - ./main_test > /dev/null
        - cd - ; echo "Cpp tests completed --------"
        
    artifacts:
        paths:
            - kernelo*.so
    