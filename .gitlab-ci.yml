image: samidj/kernelo-builder:v1.0

stages:
    - test
    - notify
    - build
    - deploy

build:
    stage: build
    only:
        refs:
          - merge_requests
        variables:
          - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "production"

    script:
        - echo "building kernel"
        - mkdir -p build/library
        - python3.7 setup.py build_ext --build-lib=build/library -vvv
    artifacts:
        paths:
            - build/library/*.so
            
staging:
    before_script: 
        - cd test_env
    stage: deploy
    image: ruby:latest
    script:
        - apt-get update -qy
        - apt-get install -y ruby-dev
        - gem install dpl
        - dpl --provider=heroku --app=$HEROKU_APP_STAGING --api-key=$HEROKU_API_KEY
        
production:
    before_script: 
        - cd test_env
    stage: deploy
    image: ruby:latest
    script:
        - apt-get update -qy
        - apt-get install -y ruby-dev
        - gem install dpl
        - dpl --provider=heroku --app=$HEROKU_APP_PRODUCTION --api-key=$HEROKU_API_KEY

        
cppcheck:
    image : ubuntu:bionic
    stage : test
    before_script: 
        - apt update
        - apt install -y --no-install-recommends cppcheck=1.82-1
        - cppcheck --version
    script:
        - cppcheck src --verbose --enable=all --language=c++
        
doxygen:
    image: alpine:3.7
    stage : test
    before_script:
        - apk update
        - apk add --no-cache -t .required_apks doxygen=1.8.13-r1 gra
        - mkdir -p build/docs/cpp_doc
    scripts:
        - doxygen docs/Doxyfile
    artifacts:
        paths:
            - build/docs/cpp_doc/html/


    
        
    
    
