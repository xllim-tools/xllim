# List of stages for jobs, and their order of execution
stages:
    - build
    - xllim
    - deploy


# ------------------------------ build stage ------------------------------

build-docker-images:
    stage: build
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: docker:stable
    script:
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_base_image:$CI_COMMIT_BRANCH" --target base_image .
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_builder:$CI_COMMIT_BRANCH" --target builder .
        - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
        - docker push "$CI_REGISTRY_IMAGE/xllim_base_image:$CI_COMMIT_BRANCH"
        - docker push "$CI_REGISTRY_IMAGE/xllim_builder:$CI_COMMIT_BRANCH"


# ------------------------------ xllim stage ------------------------------
# this on-job stage run build + test + deployement of xllim library
# The build is made thanks to cmake
# the tests are done with ctest for unittest and python script for integration tests
# If the two precedent steps succeded then the xllim.so library is deploy through Gitlab artifacts

compile-and-test-xllim:
    stage: xllim
    when: manual
    artifacts:
        paths:
            - xllim*.so
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder:$CI_COMMIT_BRANCH"
    script:
        # build step
        - apt-get update
        - apt-get install -y --no-install-recommends git
        - git submodule init
        - git submodule update
        - git submodule
        - rm -rf build && mkdir build && cd build
        - cmake -S .. -B . -DPYTHON_LIBRARY_DIR="$(pwd)/.." -DCMAKE_BUILD_TYPE=Release
        - make install

        # cpp unit test step
        - cp xllim*.so /usr/lib/python3/dist-packages/xllim.so
        - ctest
        - cd ..
        
        # python integration test step
        - cd tests/pythonTests/
        - pytest -v --tb=short --color=yes


# ------------------------------ deploy stage ------------------------------

deploy-xllim-minimal-docker-image:
    stage: deploy
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: docker:stable
    dependencies:
        - compile-and-test-xllim  # Only fetch artifacts from the build job
    script:
        - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_runner:$CI_COMMIT_BRANCH" --target runner .
        - docker push "$CI_REGISTRY_IMAGE/xllim_runner:$CI_COMMIT_BRANCH"

pages:
    stage: deploy
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder:$CI_COMMIT_BRANCH"
    script:
        - sphinx-build -b html docs/sphinx/source public
    artifacts:
        paths:
            - public
