image: samidj/kernelo-builder:v1.0

stages:
    - test
    - notify
    - build
    - deploy

build:
    stage: build
    script:
        - echo "building kernel"
        - python3.7 setup.py build_ext --inplace -vvv
    artifacts:
        paths:
            - ./*.so
            
staging:
    before_script:
        - cp kernelo.cpython-37m-x86_64-linux-gnu.so test_env/kernelo.cpython-37m-x86_64-linux-gnu.so
        - cd test_env
    type: deploy
    stage: deploy
    image: ruby:latest
    script:
        - apt-get update -qy
        - apt-get install -y ruby-dev
        - gem install dpl
        - echo "the project directory is - $CI_PROJECT_DIR"
        - cat $CI_PROJECT_DIR/README.md ; echo
        - echo "and where am I? - $PWD"
        - dpl --provider=heroku --app=$HEROKU_APP_STAGING --api-key=$HEROKU_API_KEY
        - ls
    
    
