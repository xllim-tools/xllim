# List of stages for jobs, and their order of execution
stages:
    - build
    - test
    - deploy


# ------------------------------ build stage ------------------------------

build-dockers-job:
    stage: build
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: docker:stable
    script:
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_runner" --target runner .
        - docker build -t "$CI_REGISTRY_IMAGE/xllim_builder" --target builder .
        # - docker build -f Builder.dockerfile -t "$CI_REGISTRY_IMAGE/kernelo_coverage" --target coveragetester .
        - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
        - docker push "$CI_REGISTRY_IMAGE/xllim_runner"
        - docker push "$CI_REGISTRY_IMAGE/xllim_builder"
        # - docker push "$CI_REGISTRY_IMAGE/kernelo_coverage"

build-lib-job:
    stage: build
    when: manual
    artifacts:
        paths:
            - build/
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    script:
        - apt-get update
        - apt-get install -y --no-install-recommends git
        - git submodule init
        - git submodule update
        - git submodule
        - rm -rf build && mkdir build && cd build
        - cmake -S .. -B . -DPYTHON_LIBRARY_DIR="$(pwd)" -DCMAKE_BUILD_TYPE=Release
        - make install
        - ls
        - ls ..
        # - mv xllim*.so xllim.so

# ------------------------------ test stage ------------------------------

test-job:
    stage: test
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    dependencies:
        - build-lib-job  # Only fetch artifacts from the build job
    script:
        # - apt-get update
        # - apt-get install -y --no-install-recommends git
        # - git submodule init
        # - git submodule update
        # - git submodule
        # - rm -rf build && mkdir build && cd build
        # # On est censé build ici et dans build_job... redondant !
        # - cmake -S .. -B . -DPYTHON_LIBRARY_DIR="$(pwd)/.." -DCMAKE_BUILD_TYPE=Release
        # - make install
        - ls
        - ls build
        - cp build/xllim*.so /usr/lib/python3/dist-packages/xllim.so
        - cd build
        - ctest
        - cd ../tests/pythonTests/
        - python3 integration_tests.py

# ------------------------------ deploy stage ------------------------------

deploy-lib-job:
    stage: deploy
    when: manual
    artifacts:
        paths:
            - xllim.so
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    dependencies:
        - build-lib-job  # Only fetch artifacts from the build job
    script:
        # - apt-get update
        # - apt-get install -y --no-install-recommends git
        # - git submodule init
        # - git submodule update
        # - git submodule
        # - rm -rf build && mkdir build && cd build
        # - cmake -S .. -B . -DPYTHON_LIBRARY_DIR="$(pwd)/.." -DCMAKE_BUILD_TYPE=Release
        # - make install
        - ls
        - ls build
        - mv build/xllim*.so xllim.so

deploy-xllim-minimal-job:
    stage: deploy
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: docker:stable
    dependencies:
        - build-lib-job  # Only fetch artifacts from the build job
    script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        # - apk update
        # - apk add curl
        # - 'curl --location --output artifacts.zip --header "JOB-TOKEN: $CI_JOB_TOKEN" "https://gitlab.inria.fr/api/v4/projects/$CI_PROJECT_ID/jobs/artifacts/v2/download?job=build_job"'
        # - unzip artifacts.zip
        # - rm artifacts.zip
        - docker pull $CI_REGISTRY_IMAGE/xllim_runner
        - docker run -it -d --rm --name xllim_minimal_temp_container $CI_REGISTRY_IMAGE/xllim_runner
        - docker cp build/xllim*.so xllim_minimal_temp_container:/usr/lib/python3/dist-packages/xllim.so
        - docker commit xllim_minimal_temp_container $CI_REGISTRY_IMAGE/xllim_minimal
        - docker stop xllim_minimal_temp_container
        - docker push "$CI_REGISTRY_IMAGE/xllim_minimal"

pages:
    stage: deploy
    when: manual
    tags:
        - ci.inria.fr
        - small
    image: "$CI_REGISTRY_IMAGE/xllim_builder"
    script:
        - pip install -U sphinx sphinx-rtd-theme myst_parser sphinx-copybutton
        - sphinx-build -b html docs/sphinx/source public
    artifacts:
        paths:
            - public
