image: samidj/kernelo-builder:v1.0

stages:
    - test
    - notify
    - build
    - deploy

build:
    stage: build
    script:
        - echo "building kernel"
        - python3.7 setup.py build_ext --build-lib=test_env -vvv
    artifacts:
        paths:
            - test_env/*.so
            
staging:
    type: deploy
    stage: deploy
    image: ruby:latest
    script:
        script:
        - apt-get update -qy
        - apt-get install -yqq ruby ruby-dev nodejs --silent
        - gem install dpl
        - dpl --provider=heroku --dir=test_env --app=$HEROKU_APP_STAGING --api-key=$HEROKU_API_KEY
    
    
