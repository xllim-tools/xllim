[build-system]
requires = [
    "setuptools>=42",
    "wheel",
    "scikit-build-core>=0.7.0",
    "numpy>=1.21,<1.22",
]
build-backend = "scikit_build_core.build"

[project]
name = "xllim"
version = "2.0.0" # Or your desired Python package version
# ... other metadata from previous example ...
dependencies = [
    "numpy>=1.21,<1.22",
    "h5py",
]

[project.scripts]
xllim_cli = "xllim.cli:main"

[tool.scikit-build]
cmake.source-dir = "." # Root CMakeLists.txt
cmake.args = ["-G", "Ninja"]
cmake.build-type = "Release"
wheel.packages = ["xllim"]
