{% set name = "xllim" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.18
    - ninja
    - make
    - git

  host:
    - python =3.10
    - pip
    - setuptools >=42
    - wheel
    - scikit-build-core >=0.7.0
    - numpy >=1.21,<1.22
    - boost
    - openblas >=0.3.29
    - Armadillo 12.6.7

  run:
    - python =3.10
    - numpy >=1.21,<1.22
    - h5py
    - openblas >=0.3.29
    - libstdcxx-ng  # [linux]

test:
  imports:
    - xllim
    - xllim._core
    - xllim.cli
    - xllim.utils
  commands:
    - xllim_cli --help  # Test if the command-line tool is installed and works
  requires:
    - pip # For pip check
  source_files: # Optional: if you have C++ tests you want to run as part of conda build
    - tests/

about:
  home: https://gitlab.inria.fr/xllim # Your project's homepage
  license: CECIL # Or your actual license
  license_file: LICENCE.txt
  summary: 'Python package for XLLiM with C++ core'
  description: |
    A longer description of your package.
  doc_url: https://xllim.gitlabpages.inria.fr/xllim/index.html
  dev_url: https://gitlab.inria.fr/xllim

anaconda_upload: False