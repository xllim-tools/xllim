{% set name = "xllim" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  build:
    - {{ compiler('cxx') }}     # C++ compiler (e.g., gxx_linux-64, clangxx_osx-64)
    - cmake >=3.18
    - ninja
    - make
    - git

  host:
    - python =3.11
    - pip
    - setuptools >=42            # Needed by pip/build process
    - wheel                      # Needed by pip/build process
    - scikit-build-core >=0.7.0
    - numpy >=1.20,<2.0          # Also needed at host/runtime for carma/pybind11 bindings
    - boost                      # Or boost-cpp for just the C++ libs
    - openblas                   # Or mkl, blis - provides BLAS and LAPACK
    - Armadillo         # 12.6.x From conda-forge
    # - lapack                   # Often provided by the BLAS package (like openblas)

  run:
    - python =3.11
    - numpy >=1.20,<2.0
    - h5py
    - openblas
    - libstdcxx-ng  # [linux]

test:
  imports:
    - xllim
    - xllim._core # Try importing the C++ module directly
    - xllim.cli
    - xllim.utils
  commands:
    - xllim_cli --help  # Test if the command-line tool is installed and works
    # Optional: Run a small Python script that uses the library
    # - python -c "import xllim; model = xllim.Gllim(2,1); print('Test OK')"
  requires:
    - pip # For pip check
  source_files: # Optional: if you have C++ tests you want to run as part of conda build
    - tests/
  # To run C++ tests (more advanced, requires tests to be built by CMake during conda build):
  # script:
  #   - ctest --output-on-failure # Assuming CMake tests were built and registered

about:
  home: https://gitlab.inria.fr/xllim # Your project's homepage
  license: CECIL # Or your actual license
  license_file: LICENCE.txt
  summary: 'Python package for XLLiM with C++ core'
  description: |
    A longer description of your package.
  doc_url: # URL to your documentation
  dev_url: https://gitlab.inria.fr/xllim # URL to your development repository

# Optional: For uploading to Anaconda.org
anaconda_upload: False