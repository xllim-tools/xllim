name: Build and Publish

on:
  pull_request:
    branches: [master]
  release:
    types: [published]  # When a GitHub release is published (GitHub interface, safer than tag trigger)
  workflow_dispatch:  # manual activation

jobs:
  test-and-scan:
    name: Test & SonarQube analysis
    runs-on: ubuntu-latest
    environment: sonar  # Required to access the SONAR_TOKEN secret defined in this GitHub environment
    permissions:
      contents: read
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output # Directory where build-wrapper output will be placed

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history needed by SonarQube for accurate blame/new code detection

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: test_env
          create-args: >-
            python=3.11
            gcc_linux-64
            gxx_linux-64
            cmake>=3.21
            ninja
            numpy
            boost>=1.78
            libboost-devel
            armadillo>=12.6
            pybind11>=2.12.0
            carma
            libblas
            liblapack
            pytest
            pytest-cov
            gcovr
          init-shell: bash

      # build-wrapper traces every compiler invocation during the build and produces a
      # compile_commands.json that SonarQube needs to understand C++ code (includes, flags, etc.).
      - name: Install SonarQube build wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6

      - name: Configure
        shell: bash -el {0}
        run: |
          mkdir build && cd build
          cmake -DXLLIM_BUILD_TESTS=ON \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_CXX_FLAGS="--coverage -O0" \
                -G Ninja ..

      # The build is wrapped so SonarQube can analyse C++ sources.
      # This replaces a plain "cmake --build" call.
      - name: Build (with build wrapper)
        shell: bash -el {0}
        run: |
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} \
            cmake --build build -j$(nproc)

      - name: Run C++ tests
        shell: bash -el {0}
        run: cd build && ctest --output-on-failure

      # gcovr collects .gcda/.gcno files generated by --coverage and produces a Sonar-compatible XML report
      - name: Generate C++ coverage report
        shell: bash -el {0}
        run: |
          gcovr --root . \
                --filter src/ \
                --gcov-executable x86_64-conda-linux-gnu-gcov \
                --gcov-ignore-errors=no_working_dir_found \
                --sonarqube coverage-cpp.xml

      - name: Run Python tests with coverage
        shell: bash -el {0}
        run: |
          pip install -e .
          pytest tests/pythonTests \
            --cov=xllim \
            --cov-report=xml:coverage-python.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # compile-commands tells SonarQube where the build-wrapper output is,
        # so it can analyse C++ code with the correct compilation context.
        with:
          args: >
            --define sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json

  build-wheels:
    name: Build Linux wheels with cibuildwheel
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cibuildwheel

      - name: Build sdist
        run: |
          python -m build --sdist --outdir dist

      - name: Build wheels
        run: |
          cibuildwheel dist/*.tar.gz --output-dir wheelhouse
        env:
          # Use manylinux_2_28 (AlmaLinux 8) to ensure glibc compatibility with most modern distros
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: "pytest {project}/tests/pythonTests"

          CIBW_ENVIRONMENT: >
            CXXFLAGS="-fPIC"
            CFLAGS="-fPIC"
            CMAKE_ARGS="-DCMAKE_POSITION_INDEPENDENT_CODE=ON
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
            -DCMAKE_SHARED_LINKER_FLAGS='-static-libstdc++'
            -DCMAKE_MODULE_LINKER_FLAGS='-static-libstdc++'
            -DBoost_ROOT=/usr/local
            -DBoost_NO_SYSTEM_PATHS=ON
            -DBoost_USE_STATIC_LIBS=ON"

          # Install all necessary dependancies in cibuildwheel conatiners
          # epl-release : for access at Armadillo
          # Boost Manual Compilation: We compile Boost 1.78 from source instead of using
          # the system's 1.66 to meet the minimum requirement (>1.68 for boost/random/sobol.hpp)
          # and ensure ABI compatibility by linking it statically into the final binary.
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y epel-release &&
            dnf install -y blas-devel lapack-devel armadillo-devel &&

            curl -L https://archives.boost.io/release/1.78.0/source/boost_1_78_0.tar.gz -o boost.tar.gz &&
            tar -xzf boost.tar.gz &&
            cd boost_1_78_0 &&
            ./bootstrap.sh --prefix=/usr/local &&
            ./b2 --with-system --with-thread --with-random link=static variant=release cxxflags="-fPIC" cflags="-fPIC" -j$(nproc) install &&
            cd .. && rm -rf boost_1_78_0 boost.tar.gz &&

            curl -L https://github.com/RUrlus/carma/archive/refs/tags/v0.8.0.tar.gz -o carma.tar.gz &&
            tar -xzf carma.tar.gz &&
            cd carma-0.8.0 &&
            mkdir build && cd build &&
            cmake -DCARMA_INSTALL_LIB=ON .. && 
            cmake --build . --config Release --target install

          # Targets Python 3.11–3.12 for x86_64.
          CIBW_BUILD: "cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux_*"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz


  publish-testpypi:
    name: Upload to TestPyPI
    # Runs only on manual dispatch, to test publishing before an official release
    # Deactivated, remove "&& false" to activate
    if: |
      github.event_name == 'workflow_dispatch' && false
    runs-on: ubuntu-latest
    needs: build-wheels

    environment:
      name: testpypi  # Use of environment highly recommended when using trusted publishing
      url: https://test.pypi.org/project/xllim/

    permissions:
      id-token: write  # Mandatory permission for OIDC Trusted Publishing
      contents: read

    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      # No tokens here as we're using Trusted Publishing. Set up directly on TestPyPI
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/


  publish-pypi:
    name: Upload to PyPI
    # Runs only when a GitHub release is published
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build-wheels

    environment:
      name: pypi  # Use of environment highly recommended when using trusted publishing

    permissions:
      id-token: write  # Mandatory permission for OIDC Trusted Publishing
      contents: read

    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      # No tokens here as we're using Trusted Publishing. Set up directly on PyPI
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1