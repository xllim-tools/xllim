name: Build and Publish

on:
  release:
    types: [published]  # When a GitHub release is published (GitHub interface, safer than tag trigger)
  workflow_dispatch:  # manual activation

jobs:
  build-wheels:
    name: Build Linux wheels with cibuildwheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cibuildwheel

      - name: Build sdist
        run: |
          python -m build --sdist --outdir dist

      - name: Build wheels
        run: |
          cibuildwheel dist/*.tar.gz --output-dir wheelhouse
        env:
          # Use manylinux_2_28 (AlmaLinux 8) to ensure glibc compatibility with most modern distros
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: "pytest {project}/tests/pythonTests"

          CIBW_ENVIRONMENT: >
            CXXFLAGS="-fPIC"
            CFLAGS="-fPIC"
            CMAKE_ARGS="-DCMAKE_POSITION_INDEPENDENT_CODE=ON
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
            -DCMAKE_SHARED_LINKER_FLAGS='-static-libstdc++'
            -DCMAKE_MODULE_LINKER_FLAGS='-static-libstdc++'
            -DBoost_ROOT=/usr/local
            -DBoost_NO_SYSTEM_PATHS=ON
            -DBoost_USE_STATIC_LIBS=ON"

          # Install all necessary dependancies in cibuildwheel conatiners
          # epl-release : for access at Armadillo
          # Boost Manual Compilation: We compile Boost 1.78 from source instead of using
          # the system's 1.66 to meet the minimum requirement (>1.68 for boost/random/sobol.hpp)
          # and ensure ABI compatibility by linking it statically into the final binary.
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y epel-release &&
            dnf install -y blas-devel lapack-devel armadillo-devel &&

            curl -L https://archives.boost.io/release/1.78.0/source/boost_1_78_0.tar.gz -o boost.tar.gz &&
            tar -xzf boost.tar.gz &&
            cd boost_1_78_0 &&
            ./bootstrap.sh --prefix=/usr/local &&
            ./b2 --with-system --with-thread --with-random link=static variant=release cxxflags="-fPIC" cflags="-fPIC" -j$(nproc) install &&
            cd .. && rm -rf boost_1_78_0 boost.tar.gz &&

            curl -L https://github.com/RUrlus/carma/archive/refs/tags/v0.8.0.tar.gz -o carma.tar.gz &&
            tar -xzf carma.tar.gz &&
            cd carma-0.8.0 &&
            mkdir build && cd build &&
            cmake -DCARMA_INSTALL_LIB=ON .. && 
            cmake --build . --config Release --target install

          # Targets Python 3.11–3.12 for x86_64.
          CIBW_BUILD: "cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux_*"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz


  publish-testpypi:
    name: Upload to TestPyPI
    # Runs only on manual dispatch, to test publishing before an official release
    # Deactivated, remove "&& false" to activate
    if: |
      github.event_name == 'workflow_dispatch' && false
    runs-on: ubuntu-latest
    needs: build-wheels

    environment:
      name: testpypi  # Use of environment highly recommended when using trusted publishing
      url: https://test.pypi.org/project/xllim/

    permissions:
      id-token: write  # Mandatory permission for OIDC Trusted Publishing
      contents: read

    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      # No tokens here as we're using Trusted Publishing. Set up directly on TestPyPI
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/


  publish-pypi:
    name: Upload to PyPI
    # Runs only when a GitHub release is published
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build-wheels

    environment:
      name: pypi  # Use of environment highly recommended when using trusted publishing

    permissions:
      id-token: write  # Mandatory permission for OIDC Trusted Publishing
      contents: read

    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      # No tokens here as we're using Trusted Publishing. Set up directly on PyPI
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1